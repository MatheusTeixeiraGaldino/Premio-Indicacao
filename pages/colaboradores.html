<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaboradores — Prêmio por Indicação</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Colaboradores</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btn-add-manual">+ Cadastrar Manualmente</button>
      </div>
    </header>
    <main class="page-content">

      <!-- Filtros -->
      <div class="card mb-4">
        <div class="filter-bar" style="margin-bottom:0;flex-wrap:wrap">
          <input type="text" id="f-busca" class="form-control" placeholder="Buscar nome, matrícula ou setor..." style="flex:1;min-width:180px">
          <select id="f-status" class="form-control" style="max-width:160px">
            <option value="todos">Todos</option>
            <option value="ativo" selected>Ativos</option>
            <option value="desligado">Desligados</option>
          </select>
          <select id="f-indicado" class="form-control" style="max-width:180px">
            <option value="todos">Todos</option>
            <option value="nao">Sem indicação</option>
            <option value="sim">Com indicação</option>
          </select>
          <button class="btn btn-accent btn-sm" id="filter-btn">Filtrar</button>
          <button class="btn btn-ghost btn-sm" id="clear-btn">Limpar</button>
        </div>
      </div>

      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Matrícula</th>
                <th>Nome</th>
                <th>Setor</th>
                <th>Admissão</th>
                <th>Contrato</th>
                <th>Status</th>
                <th>Indicação</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-colab">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     Modal: Marcar como Indicado
════════════════════════════════════════════════ -->
<div class="modal-overlay" id="indicar-overlay">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title">🌟 Registrar Indicação</span>
      <button class="modal-close" id="indicar-close">×</button>
    </div>
    <div class="modal-body">

      <!-- Info do colaborador indicado (somente leitura) -->
      <div id="indicado-info" style="background:var(--bg-card2);border:1px solid var(--border-light);border-radius:8px;padding:14px;margin-bottom:20px;font-size:13.5px">
      </div>

      <div id="indicar-alert"></div>

      <div class="form-section-title">🌟 Dados de Quem Indicou</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Matrícula de Quem Indicou *</label>
          <input type="text" id="i-mat-indicador" class="form-control" placeholder="Ex: 00456">
        </div>
        <div class="form-group">
          <label class="form-label">Nome de Quem Indicou *</label>
          <input type="text" id="i-nome-indicador" class="form-control" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label class="form-label">Setor de Quem Indicou</label>
          <input type="text" id="i-setor-indicador" class="form-control" placeholder="Setor atual">
        </div>
      </div>

      <div class="form-section-title">💰 Previsão e Valor</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Previsão de Pagamento</label>
          <input type="date" id="i-previsao" class="form-control" readonly style="cursor:not-allowed;background:var(--bg-card2)">
          <div class="text-sm text-muted mt-1" id="i-previsao-info">Calculado automaticamente</div>
        </div>
        <div class="form-group">
          <label class="form-label">Valor do Prêmio (R$)</label>
          <input type="number" id="i-valor" class="form-control" placeholder="Valor padrão">
          <div class="text-sm text-muted mt-1">Deixe em branco para usar o valor padrão</div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="indicar-cancel">Cancelar</button>
      <button class="btn btn-primary" id="indicar-save">✓ Confirmar Indicação</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     Modal: Cadastro Manual de Colaborador
════════════════════════════════════════════════ -->
<div class="modal-overlay" id="manual-overlay">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <span class="modal-title">➕ Cadastrar Colaborador Manualmente</span>
      <button class="modal-close" id="manual-close">×</button>
    </div>
    <div class="modal-body">
      <div id="manual-alert"></div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Matrícula *</label>
          <input type="text" id="m-matricula" class="form-control" placeholder="Ex: 00123">
        </div>
        <div class="form-group">
          <label class="form-label">Nome Completo *</label>
          <input type="text" id="m-nome" class="form-control" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label class="form-label">Setor *</label>
          <input type="text" id="m-setor" class="form-control" placeholder="Nome do setor">
        </div>
        <div class="form-group">
          <label class="form-label">Data de Admissão *</label>
          <input type="date" id="m-adm" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de Contrato *</label>
          <select id="m-tipo" class="form-control">
            <option value="experiencia">Experiência (180 dias)</option>
            <option value="determinado">Prazo Determinado</option>
          </select>
        </div>
        <div class="form-group" id="m-grp-termino" style="display:none">
          <label class="form-label">Data de Término</label>
          <input type="date" id="m-termino" class="form-control">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="manual-cancel">Cancelar</button>
      <button class="btn btn-primary" id="manual-save">Salvar Colaborador</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '../js/auth.js';
  import { renderSidebar, showToast, openModal, closeModal, formatCurrency } from '../js/ui.js';
  import { listarColaboradores, upsertColaborador, marcarComoIndicado, desmarcarComoIndicado, toInputDate } from '../js/colaboradores.js';
  import { criarIndicacao, calcularPrevisaoPagamento } from '../js/indicacoes.js';
  import { getConfig } from '../js/config.js';

  const user = requireAuth(['admin', 'dh']);
  if (!user) throw new Error('Not auth');
  renderSidebar('colaboradores.html');

  let allColab = [];
  let selectedColab = null;
  let valorPadrao = 500;

  getConfig().then(cfg => {
    valorPadrao = cfg.valorPadrao || 500;
    document.getElementById('i-valor').placeholder = `Padrão: R$ ${valorPadrao}`;
  });

  // ── Carregar lista ──────────────────────────────────────
  async function load() {
    const filtros = {
      status: document.getElementById('f-status').value === 'todos' ? undefined : document.getElementById('f-status').value,
      busca: document.getElementById('f-busca').value,
      foiIndicado: document.getElementById('f-indicado').value === 'todos'
        ? undefined
        : document.getElementById('f-indicado').value === 'sim'
    };
    allColab = await listarColaboradores(filtros);
    render(allColab);
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('pt-BR');
  }

  function render(lista) {
    const tbody = document.getElementById('tbody-colab');
    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">Nenhum colaborador encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(c => `
      <tr>
        <td style="font-family:monospace;font-size:13px">${c.matricula}</td>
        <td style="font-weight:500">${c.nome}</td>
        <td style="font-size:13px">${c.setor || '—'}</td>
        <td style="font-size:13px">${formatDate(c.dataAdmissao)}</td>
        <td>
          <span class="badge ${c.tipoContrato === 'determinado' ? 'badge-purple' : 'badge-blue'}">
            ${c.tipoContrato === 'determinado' ? 'Determinado' : 'Experiência'}
          </span>
        </td>
        <td>
          ${c.status === 'ativo'
            ? '<span class="badge badge-green">Ativo</span>'
            : '<span class="badge badge-red">Desligado</span>'}
        </td>
        <td>
          ${c.foiIndicado
            ? '<span class="badge badge-yellow">✓ Indicado</span>'
            : '<span class="badge badge-gray">Não indicado</span>'}
        </td>
        <td>
          ${!c.foiIndicado && c.status === 'ativo'
            ? `<button class="btn btn-primary btn-sm indicar-btn" data-id="${c.id}">Marcar como Indicado</button>`
            : c.foiIndicado && c.indicacaoId
              ? `<div class="flex gap-2">
                   <a href="indicacoes.html" class="btn btn-ghost btn-sm">Ver</a>
                   <button class="btn btn-ghost btn-sm desmarcar-btn" data-id="${c.id}" style="color:var(--danger)">Desmarcar</button>
                 </div>`
              : '<span style="color:var(--text-dim);font-size:12px">—</span>'
          }
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.indicar-btn').forEach(btn => {
      btn.addEventListener('click', () => abrirIndicar(btn.dataset.id));
    });

    document.querySelectorAll('.desmarcar-btn').forEach(btn => {
      btn.addEventListener('click', () => confirmarDesmarcar(btn.dataset.id));
    });
  }

  // ── Confirmar Desmarcar ──────────────────────────────────
  async function confirmarDesmarcar(id) {
    const colab = allColab.find(c => c.id === id);
    if (!colab) return;

    import('../js/ui.js').then(({ createConfirmModal }) => {
      createConfirmModal(`Deseja realmente desmarcar a indicação de <b>${colab.nome}</b>?<br><br><small>Isso removerá o registro da indicação e permitirá que ele seja indicado novamente.</small>`, async () => {
        try {
          await desmarcarComoIndicado(id, user.uid);
          showToast('Indicação desmarcada com sucesso!', 'success');
          load();
        } catch (e) {
          showToast(e.message, 'error');
        }
      });
    });
  }

  // ── Abrir modal Indicar ─────────────────────────────────
  function abrirIndicar(id) {
    selectedColab = allColab.find(c => c.id === id);
    if (!selectedColab) return;

    // Preencher info do indicado
    document.getElementById('indicado-info').innerHTML = `
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Colaborador</div>
             <div style="font-weight:600;font-size:14px">${selectedColab.nome}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Matrícula</div>
             <div style="font-weight:500">${selectedColab.matricula}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Setor</div>
             <div>${selectedColab.setor || '—'}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Admissão</div>
             <div>${formatDate(selectedColab.dataAdmissao)}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Contrato</div>
             <div>${selectedColab.tipoContrato === 'determinado' ? 'Prazo Determinado' : 'Experiência'}</div></div>
      </div>
    `;

    // Calcular previsão automaticamente
    if (selectedColab.dataAdmissao) {
      const adm = toInputDate(selectedColab.dataAdmissao);
      const termino = selectedColab.dataTerminoContrato ? toInputDate(selectedColab.dataTerminoContrato) : null;
      const prev = calcularPrevisaoPagamento(adm, selectedColab.tipoContrato, termino);
      const prevEl = document.getElementById('i-previsao');
      prevEl.value = prev.toISOString().split('T')[0];
      document.getElementById('i-previsao-info').textContent = 'Calculado: ' + prev.toLocaleDateString('pt-BR');
    }

    // Limpar campos
    document.getElementById('i-mat-indicador').value = '';
    document.getElementById('i-nome-indicador').value = '';
    document.getElementById('i-setor-indicador').value = '';
    document.getElementById('i-valor').value = '';
    document.getElementById('indicar-alert').innerHTML = '';

    openModal('indicar-overlay');
  }

  // ── Salvar Indicação ────────────────────────────────────
  document.getElementById('indicar-save').addEventListener('click', async () => {
    const alertEl = document.getElementById('indicar-alert');
    alertEl.innerHTML = '';

    const matIndicador = document.getElementById('i-mat-indicador').value.trim();
    const nomeIndicador = document.getElementById('i-nome-indicador').value.trim();
    const setorIndicador = document.getElementById('i-setor-indicador').value.trim();
    const valor = document.getElementById('i-valor').value;

    if (!matIndicador || !nomeIndicador) {
      alertEl.innerHTML = '<div class="alert alert-error">Informe matrícula e nome de quem indicou.</div>';
      return;
    }

    const btn = document.getElementById('indicar-save');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const adm = toInputDate(selectedColab.dataAdmissao);
      const termino = selectedColab.dataTerminoContrato ? toInputDate(selectedColab.dataTerminoContrato) : null;

      const dados = {
        matriculaIndicado: selectedColab.matricula,
        nomeIndicado: selectedColab.nome,
        setorIndicado: selectedColab.setor || '',
        dataAdmissao: adm,
        tipoContrato: selectedColab.tipoContrato,
        dataTerminoContrato: termino,
        matriculaIndicador: matIndicador,
        nomeIndicador: nomeIndicador,
        setorIndicador: setorIndicador,
        valorPremio: valor ? parseFloat(valor) : null
      };

      const indicacaoId = await criarIndicacao(dados, user.uid);
      await marcarComoIndicado(selectedColab.id, indicacaoId, user.uid);

      showToast(`Indicação de ${selectedColab.nome} registrada com sucesso!`, 'success');
      closeModal('indicar-overlay');
      await load();
    } catch (e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = '✓ Confirmar Indicação';
  });

  document.getElementById('indicar-close').onclick = () => closeModal('indicar-overlay');
  document.getElementById('indicar-cancel').onclick = () => closeModal('indicar-overlay');

  // ── Cadastro Manual ─────────────────────────────────────
  document.getElementById('btn-add-manual').onclick = () => {
    document.getElementById('manual-alert').innerHTML = '';
    ['m-matricula','m-nome','m-setor','m-adm','m-termino'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('m-tipo').value = 'experiencia';
    document.getElementById('m-grp-termino').style.display = 'none';
    openModal('manual-overlay');
  };

  document.getElementById('m-tipo').addEventListener('change', (e) => {
    document.getElementById('m-grp-termino').style.display = e.target.value === 'determinado' ? '' : 'none';
  });

  document.getElementById('manual-close').onclick = () => closeModal('manual-overlay');
  document.getElementById('manual-cancel').onclick = () => closeModal('manual-overlay');

  document.getElementById('manual-save').addEventListener('click', async () => {
    const alertEl = document.getElementById('manual-alert');
    alertEl.innerHTML = '';

    const matricula = document.getElementById('m-matricula').value.trim();
    const nome = document.getElementById('m-nome').value.trim();
    const setor = document.getElementById('m-setor').value.trim();
    const adm = document.getElementById('m-adm').value;
    const tipo = document.getElementById('m-tipo').value;
    const termino = document.getElementById('m-termino').value || null;

    if (!matricula || !nome || !setor || !adm) {
      alertEl.innerHTML = '<div class="alert alert-error">Preencha todos os campos obrigatórios.</div>';
      return;
    }
    if (tipo === 'determinado' && !termino) {
      alertEl.innerHTML = '<div class="alert alert-error">Informe a data de término para contrato determinado.</div>';
      return;
    }

    const btn = document.getElementById('manual-save');
    btn.disabled = true;

    try {
      await upsertColaborador({ matricula, nome, setor, dataAdmissao: adm, tipoContrato: tipo, dataTerminoContrato: termino }, 'manual', user.uid);
      showToast('Colaborador salvo com sucesso!', 'success');
      closeModal('manual-overlay');
      await load();
    } catch (e) {
      alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
    btn.disabled = false;
  });

  // ── Filtros ────────────────────────────────────────────
  document.getElementById('filter-btn').addEventListener('click', load);
  document.getElementById('f-busca').addEventListener('input', load);
  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('f-busca').value = '';
    document.getElementById('f-status').value = 'ativo';
    document.getElementById('f-indicado').value = 'todos';
    load();
  });

  load();
</script>
</body>
</html>
