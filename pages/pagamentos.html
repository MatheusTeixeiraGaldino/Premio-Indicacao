<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos — Prêmio por Indicação</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Pagamentos</span>
      </div>
    </header>
    <main class="page-content">

      <div class="tabs">
        <button class="tab-btn active" id="tab-pend" data-tab="pendentes">Aguardando Pagamento</button>
        <button class="tab-btn" id="tab-pago" data-tab="pagos">Pagos</button>
      </div>

      <!-- Pendentes -->
      <div id="panel-pendentes">
        <div class="card" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Indicado</th><th>Indicador</th><th>Setor</th>
                <th>Admissão</th><th>Previsão</th><th>Valor</th><th>Ação</th>
              </tr></thead>
              <tbody id="tbody-pend">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Pagos -->
      <div id="panel-pagos" style="display:none">
        <div class="filter-bar mb-4">
          <input type="month" id="f-mes" class="form-control" style="max-width:180px">
          <button class="btn btn-accent btn-sm" id="f-mes-btn">Filtrar</button>
        </div>
        <div class="card" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Indicado</th><th>Indicador</th><th>Setor</th>
                <th>Admissão</th><th>Data Pagamento</th><th>Valor</th>
              </tr></thead>
              <tbody id="tbody-pago">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal Registrar Pagamento -->
<div class="modal-overlay" id="pag-overlay">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">💳 Registrar Pagamento</span>
      <button class="modal-close" id="pag-close">×</button>
    </div>
    <div class="modal-body">
      <div id="pag-info" style="background:var(--bg-card2);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13.5px"></div>
      <div id="pag-alert"></div>
      <div class="form-group">
        <label class="form-label">Data do Pagamento *</label>
        <input type="date" id="pag-data" class="form-control">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="pag-cancel">Cancelar</button>
      <button class="btn btn-success" id="pag-save">✓ Confirmar Pagamento</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '../js/auth.js';
  import { renderSidebar, showToast, openModal, closeModal, formatCurrency, statusBadge } from '../js/ui.js';
  import { listarIndicacoes, registrarPagamento, formatDate } from '../js/indicacoes.js';

  const user = requireAuth();
  if (!user) throw new Error('Not auth');
  renderSidebar('pagamentos.html');

  let pendentes = [], pagos = [], pagId = null;

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('panel-pendentes').style.display = tab === 'pendentes' ? '' : 'none';
      document.getElementById('panel-pagos').style.display = tab === 'pagos' ? '' : 'none';
    });
  });

  async function load() {
    const all = await listarIndicacoes();
    pendentes = all.filter(i => i.status === 'aguardando_pagamento');
    pagos = all.filter(i => i.status === 'pago');
    renderPendentes();
    renderPagos(pagos);
  }

  function renderPendentes() {
    const tbody = document.getElementById('tbody-pend');
    if (!pendentes.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Nenhum pagamento pendente.</td></tr>';
      return;
    }
    tbody.innerHTML = pendentes.map(i => `
      <tr>
        <td><div style="font-weight:500">${i.nomeIndicado}</div><div style="font-size:12px;color:var(--text-muted)">${i.matriculaIndicado}</div></td>
        <td>${i.nomeIndicador}<div style="font-size:12px;color:var(--text-muted)">${i.matriculaIndicador}</div></td>
        <td style="font-size:13px">${i.setorIndicado}</td>
        <td style="font-size:13px">${formatDate(i.dataAdmissao)}</td>
        <td style="font-size:13px">${formatDate(i.previsaoPagamento)}</td>
        <td style="font-family:var(--font-display);font-weight:700;color:var(--warning)">${formatCurrency(i.valorPremio)}</td>
        <td><button class="btn btn-success btn-sm pag-btn" data-id="${i.id}">Registrar Pagamento</button></td>
      </tr>
    `).join('');
    document.querySelectorAll('.pag-btn').forEach(btn => btn.addEventListener('click', () => openPag(btn.dataset.id)));
  }

  function renderPagos(lista) {
    const mes = document.getElementById('f-mes').value;
    const filtered = mes ? lista.filter(i => {
      const dp = i.dataPagamento?.toDate();
      return dp && `${dp.getFullYear()}-${String(dp.getMonth()+1).padStart(2,'0')}` === mes;
    }) : lista;

    const tbody = document.getElementById('tbody-pago');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Nenhum pagamento encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(i => `
      <tr>
        <td><div style="font-weight:500">${i.nomeIndicado}</div><div style="font-size:12px;color:var(--text-muted)">${i.matriculaIndicado}</div></td>
        <td>${i.nomeIndicador}</td>
        <td style="font-size:13px">${i.setorIndicado}</td>
        <td style="font-size:13px">${formatDate(i.dataAdmissao)}</td>
        <td style="font-size:13px">${formatDate(i.dataPagamento)}</td>
        <td style="font-family:var(--font-display);font-weight:700;color:var(--success)">${formatCurrency(i.valorPremio)}</td>
      </tr>
    `).join('');
  }

  function openPag(id) {
    pagId = id;
    const ind = pendentes.find(i => i.id === id);
    document.getElementById('pag-info').innerHTML = `
      <strong>${ind.nomeIndicado}</strong> (${ind.matriculaIndicado})<br>
      Indicado por: ${ind.nomeIndicador}<br>
      Valor: <strong style="color:var(--success)">${formatCurrency(ind.valorPremio)}</strong>
    `;
    document.getElementById('pag-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('pag-alert').innerHTML = '';
    openModal('pag-overlay');
  }

  document.getElementById('pag-close').onclick = () => closeModal('pag-overlay');
  document.getElementById('pag-cancel').onclick = () => closeModal('pag-overlay');

  document.getElementById('pag-save').addEventListener('click', async () => {
    const data = document.getElementById('pag-data').value;
    if (!data) { document.getElementById('pag-alert').innerHTML = '<div class="alert alert-error">Informe a data do pagamento.</div>'; return; }
    try {
      await registrarPagamento(pagId, data, user.uid);
      showToast('Pagamento registrado com sucesso!', 'success');
      closeModal('pag-overlay');
      await load();
    } catch (e) {
      document.getElementById('pag-alert').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  });

  document.getElementById('f-mes-btn').addEventListener('click', () => renderPagos(pagos));

  load();
</script>
</body>
</html>
