<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios — Prêmio por Indicação</title>
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Relatórios</span>
      </div>
    </header>
    <main class="page-content">

      <div class="tabs">
        <button class="tab-btn active" data-tab="pago-mes">Pago por Mês</button>
        <button class="tab-btn" data-tab="previsao-mes">Previsão por Mês</button>
        <button class="tab-btn" data-tab="ranking">Ranking</button>
        <button class="tab-btn" data-tab="gastos-futuros">Gastos Futuros</button>
      </div>

      <!-- Pago por Mês -->
      <div id="tab-pago-mes">
        <div class="card">
          <div class="card-header"><div class="card-title">Total Pago por Mês</div></div>
          <div class="chart-container" style="height:280px"><canvas id="ch-pago-mes"></canvas></div>
        </div>
        <div class="card mt-4" style="padding:0">
          <div class="table-wrap">
            <table id="tbl-pago-mes">
              <thead><tr><th>Mês</th><th>Quantidade</th><th>Total Pago</th></tr></thead>
              <tbody id="tbody-pago-mes"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Previsão por Mês -->
      <div id="tab-previsao-mes" style="display:none">
        <div class="card">
          <div class="card-header"><div class="card-title">Previsão de Pagamento por Mês</div></div>
          <div class="chart-container" style="height:280px"><canvas id="ch-prev-mes"></canvas></div>
        </div>
        <div class="card mt-4" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Mês</th><th>Indicações</th><th>Valor Previsto</th></tr></thead>
              <tbody id="tbody-prev-mes"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Ranking -->
      <div id="tab-ranking" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="card">
            <div class="card-title mb-4">🏅 Top Indicadores</div>
            <ul class="ranking-list" id="rank-indicadores"></ul>
          </div>
          <div class="card">
            <div class="card-title mb-4">🏢 Indicações por Setor</div>
            <div class="chart-container"><canvas id="ch-setor-rank"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Gastos Futuros -->
      <div id="tab-gastos-futuros" style="display:none">
        <div class="card">
          <div class="card-header">
            <div><div class="card-title">Previsão de Gastos Futuros</div><div class="card-subtitle">Próximos 12 meses</div></div>
          </div>
          <div class="chart-container" style="height:280px"><canvas id="ch-futuros"></canvas></div>
        </div>
        <div class="card mt-4" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Mês</th><th>Indicações Previstas</th><th>Valor Estimado</th></tr></thead>
              <tbody id="tbody-futuros"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script type="module">
  import { requireAuth } from '../js/auth.js';
  import { renderSidebar, formatCurrency } from '../js/ui.js';
  import { listarIndicacoes, formatDate } from '../js/indicacoes.js';

  const user = requireAuth();
  if (!user) throw new Error('Not auth');
  renderSidebar('relatorios.html');

  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#21262d';
  Chart.defaults.font.family = "'DM Sans', sans-serif";

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['pago-mes', 'previsao-mes', 'ranking', 'gastos-futuros'].forEach(id => {
        document.getElementById('tab-' + id).style.display = btn.dataset.tab === id ? '' : 'none';
      });
    });
  });

  async function buildReports() {
    const all = await listarIndicacoes();
    buildPagoMes(all);
    buildPrevMes(all);
    buildRanking(all);
    buildGastosFuturos(all);
  }

  function getMesLabel(d) {
    return d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
  }

  function getLast12Months() {
    const hoje = new Date();
    const meses = [];
    for (let i = 11; i >= 0; i--) {
      meses.push(new Date(hoje.getFullYear(), hoje.getMonth() - i, 1));
    }
    return meses;
  }

  function getNext12Months() {
    const hoje = new Date();
    const meses = [];
    for (let i = 0; i < 12; i++) {
      meses.push(new Date(hoje.getFullYear(), hoje.getMonth() + i, 1));
    }
    return meses;
  }

  function buildPagoMes(all) {
    const pagos = all.filter(i => i.status === 'pago');
    const meses = getLast12Months();
    const data = meses.map(m => {
      const items = pagos.filter(i => {
        const dp = i.dataPagamento?.toDate();
        return dp && dp.getMonth() === m.getMonth() && dp.getFullYear() === m.getFullYear();
      });
      return { label: getMesLabel(m), count: items.length, total: items.reduce((a, i) => a + i.valorPremio, 0) };
    });

    new Chart(document.getElementById('ch-pago-mes'), {
      type: 'bar',
      data: {
        labels: data.map(d => d.label),
        datasets: [{ label: 'Valor Pago', data: data.map(d => d.total), backgroundColor: 'rgba(63,185,80,0.5)', borderColor: '#3fb950', borderWidth: 1, borderRadius: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => 'R$' + (v/1000).toFixed(1) + 'k' } } } }
    });

    document.getElementById('tbody-pago-mes').innerHTML = data.filter(d => d.count > 0).map(d => `
      <tr><td>${d.label}</td><td>${d.count}</td><td><strong>${formatCurrency(d.total)}</strong></td></tr>
    `).join('') || '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-muted)">Sem dados</td></tr>';
  }

  function buildPrevMes(all) {
    const ativos = all.filter(i => ['previsto', 'aguardando_pagamento'].includes(i.status));
    const meses = getNext12Months();
    const data = meses.map(m => {
      const items = ativos.filter(i => {
        const prev = i.previsaoPagamento?.toDate();
        return prev && prev.getMonth() === m.getMonth() && prev.getFullYear() === m.getFullYear();
      });
      return { label: getMesLabel(m), count: items.length, total: items.reduce((a, i) => a + i.valorPremio, 0) };
    });

    new Chart(document.getElementById('ch-prev-mes'), {
      type: 'line',
      data: {
        labels: data.map(d => d.label),
        datasets: [{ label: 'Previsão', data: data.map(d => d.total), borderColor: '#1f6feb', backgroundColor: 'rgba(31,111,235,0.1)', fill: true, tension: 0.3, pointRadius: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => 'R$' + (v/1000).toFixed(1) + 'k' } } } }
    });

    document.getElementById('tbody-prev-mes').innerHTML = data.map(d => `
      <tr><td>${d.label}</td><td>${d.count}</td><td><strong>${formatCurrency(d.total)}</strong></td></tr>
    `).join('');
  }

  function buildRanking(all) {
    const rankMap = {};
    all.forEach(i => {
      if (!rankMap[i.matriculaIndicador]) rankMap[i.matriculaIndicador] = { nome: i.nomeIndicador, setor: i.setorIndicador, count: 0 };
      rankMap[i.matriculaIndicador].count++;
    });
    const ranking = Object.values(rankMap).sort((a, b) => b.count - a.count);

    document.getElementById('rank-indicadores').innerHTML = ranking.slice(0, 10).map((r, idx) => `
      <li class="ranking-item">
        <span class="rank-pos ${idx < 3 ? 'top' : ''}">${idx + 1}</span>
        <div class="rank-info"><div class="rank-name">${r.nome}</div><div class="rank-sub">${r.setor}</div></div>
        <span class="rank-count">${r.count}</span>
      </li>
    `).join('') || '<li style="color:var(--text-muted);font-size:13px;padding:12px 0">Sem dados</li>';

    const setorMap = {};
    all.forEach(i => { setorMap[i.setorIndicado] = (setorMap[i.setorIndicado] || 0) + 1; });
    const setores = Object.entries(setorMap).sort((a, b) => b[1] - a[1]).slice(0, 8);

    new Chart(document.getElementById('ch-setor-rank'), {
      type: 'bar',
      data: {
        labels: setores.map(s => s[0]),
        datasets: [{ data: setores.map(s => s[1]), backgroundColor: 'rgba(139,92,246,0.5)', borderColor: '#8b5cf6', borderWidth: 1, borderRadius: 4 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { stepSize: 1 } } } }
    });
  }

  function buildGastosFuturos(all) {
    const ativos = all.filter(i => ['previsto', 'aguardando_pagamento'].includes(i.status));
    const meses = getNext12Months();
    const data = meses.map(m => {
      const items = ativos.filter(i => {
        const prev = i.previsaoPagamento?.toDate();
        return prev && prev.getMonth() === m.getMonth() && prev.getFullYear() === m.getFullYear();
      });
      return { label: getMesLabel(m), count: items.length, total: items.reduce((a, i) => a + i.valorPremio, 0) };
    });

    new Chart(document.getElementById('ch-futuros'), {
      type: 'bar',
      data: {
        labels: data.map(d => d.label),
        datasets: [{ label: 'Gasto Estimado', data: data.map(d => d.total), backgroundColor: 'rgba(210,153,34,0.5)', borderColor: '#d29922', borderWidth: 1, borderRadius: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => 'R$' + (v/1000).toFixed(1) + 'k' } } } }
    });

    document.getElementById('tbody-futuros').innerHTML = data.map(d => `
      <tr><td>${d.label}</td><td>${d.count}</td><td><strong style="color:var(--warning)">${formatCurrency(d.total)}</strong></td></tr>
    `).join('');
  }

  buildReports();
</script>
</body>
</html>
